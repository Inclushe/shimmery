<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<title>Dots</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }

  /* Activation button (shown when the browser gates motion sensors) */
  #enable {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 16px);
    right: calc(env(safe-area-inset-right, 0px) + 16px);
    z-index: 10;
    padding: 11px 16px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    background: rgba(20,22,30,0.6);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.2px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: opacity .25s ease, transform .15s ease;
  }
  #enable:active { transform: scale(0.96); }
  #enable.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <button id="enable" class="hidden">Tap to activate</button>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const enableBtn = document.getElementById("enable");

  // --- Dot grid ---------------------------------------------------------
  let dots = [];
  let cols = 0, rows = 0, spacing = 0;
  let W = 0, H = 0, dpr = 1;
  const DOT_RADIUS = 1; // 2px dots

  function buildGrid() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Density scales with screen size; aim for a tight dotted texture.
    spacing = Math.max(16, Math.min(W, H) / 26);
    cols = Math.ceil(W / spacing) + 1;
    rows = Math.ceil(H / spacing) + 1;

    dots = [];
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        // Slight random jitter so the field looks organic, not like a
        // perfect printed grid.
        dots.push({
          x: i * spacing + (Math.random() - 0.5) * spacing * 0.25,
          y: j * spacing + (Math.random() - 0.5) * spacing * 0.25,
        });
      }
    }
    draw();
  }

  // --- Render -----------------------------------------------------------
  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#05060a";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#888";
    for (let k = 0; k < dots.length; k++) {
      const d = dots[k];
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- Motion handling (scaffolding, no visual effect for now) ----------
  function onMotion(e) {
    const g = e.accelerationIncludingGravity;
    if (!g || (g.x == null && g.y == null && g.z == null)) return;
    // Sensor values available here as g.x / g.y / g.z — unused for now.
  }

  // --- Sensor permission flow ------------------------------------------
  // iOS 13+ Safari (and some others) require an explicit user gesture +
  // requestPermission() before DeviceMotionEvent fires.
  const needsPermission =
    typeof DeviceMotionEvent !== "undefined" &&
    typeof DeviceMotionEvent.requestPermission === "function";

  function startListening() {
    window.addEventListener("devicemotion", onMotion, { passive: true });
  }

  function requestAndStart() {
    DeviceMotionEvent.requestPermission()
      .then((state) => {
        if (state === "granted") {
          startListening();
          enableBtn.classList.add("hidden");
        } else {
          enableBtn.textContent = "Motion blocked — retry";
        }
      })
      .catch(() => { enableBtn.textContent = "Tap to activate"; });
  }

  if (needsPermission) {
    enableBtn.classList.remove("hidden");
    enableBtn.addEventListener("click", requestAndStart);
  } else if (typeof DeviceMotionEvent !== "undefined") {
    // Browsers that don't gate the sensor: just listen.
    startListening();
  }

  window.addEventListener("resize", buildGrid);
  window.addEventListener("orientationchange", () => setTimeout(buildGrid, 200));

  buildGrid();
})();
</script>
</body>
</html>
