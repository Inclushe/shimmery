<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Dots</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }

  /* Activation button (shown when the browser gates orientation sensors) */
  #enable {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 16px);
    right: calc(env(safe-area-inset-right, 0px) + 16px);
    z-index: 10;
    padding: 11px 16px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    background: rgba(20,22,30,0.6);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.2px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: opacity .25s ease, transform .15s ease;
  }
  #enable:active { transform: scale(0.96); }
  #enable.hidden { opacity: 0; pointer-events: none; }

  /* Toggle group */
  #toggles {
    position: fixed;
    left: calc(env(safe-area-inset-left, 0px) + 16px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
  }
  #toggles label {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    background: rgba(20,22,30,0.6);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; font-size: 13px; font-weight: 600; letter-spacing: 0.2px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #toggles input[type="checkbox"] { width: 16px; height: 16px; accent-color: #fff; cursor: pointer; }
  #densityRow, #sizeRow { gap: 10px; }
  #densityRow input[type="range"], #sizeRow input[type="range"] { width: 110px; accent-color: #fff; cursor: pointer; }

  /* Info button (bottom-right) */
  #infoBtn {
    position: fixed;
    right: calc(env(safe-area-inset-right, 0px) + 16px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    width: 42px; height: 42px; padding: 0;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    background: rgba(20,22,30,0.6);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: transform .15s ease;
  }
  #infoBtn:active { transform: scale(0.94); }
  #infoBtn svg { width: 22px; height: 22px; }

  /* Info modal */
  #infoModal {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    transition: opacity .2s ease;
  }
  #infoModal.hidden { opacity: 0; pointer-events: none; }
  #infoCard {
    position: relative;
    max-width: 320px; width: 100%;
    padding: 24px 22px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    background: #14161e;
    color: #fff;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  #infoCard h2 { font-size: 17px; margin-bottom: 8px; }
  #infoCard p { font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.8); }
  #infoCard a { color: #7db4ff; }
  #infoClose {
    position: absolute; top: 8px; right: 12px;
    border: none; background: none; color: rgba(255,255,255,0.6);
    font-size: 26px; line-height: 1; cursor: pointer; padding: 4px;
  }
  #infoClose:active { color: #fff; }

  /* Debug overlay (top-left), toggled by the Debug checkbox */
  #debug {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 16px);
    left: calc(env(safe-area-inset-left, 0px) + 16px);
    z-index: 15;
    width: 232px;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(10,12,18,0.72);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #d8dde8;
    pointer-events: none; /* never intercept taps meant for the canvas */
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #debug.hidden { display: none; }
  #debug h3 {
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: rgba(255,255,255,.5); margin-bottom: 6px;
  }
  .dbg-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .dbg-label { width: 58px; color: rgba(255,255,255,.65); white-space: nowrap; }
  .dbg-track {
    position: relative; flex: 1; height: 8px; border-radius: 2px;
    background: rgba(255,255,255,.08); overflow: hidden;
  }
  .dbg-fill { position: absolute; top: 0; bottom: 0; background: #5b9bff; border-radius: 2px; }
  .dbg-track.bip::before { /* center line for bipolar (-/+) metrics */
    content: ""; position: absolute; left: 50%; top: 0; bottom: 0;
    width: 1px; background: rgba(255,255,255,.25);
  }
  .dbg-tick { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,90,90,.7); }
  .dbg-val { width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <button id="enable" class="hidden">Tap to activate</button>
  <div id="toggles">
    <label><input type="checkbox" id="predictCheck" checked /> Prediction</label>
    <label><input type="checkbox" id="accelCheck" checked /> Accel guard</label>
    <label><input type="checkbox" id="jerkCheck" checked /> Jerk guard</label>
    <label><input type="checkbox" id="smoothCheck" /> Smoothing</label>
    <label><input type="checkbox" id="debugCheck" /> Debug</label>
    <label id="densityRow">Density <input type="range" id="densitySlider" min="12" max="60" value="34" /></label>
    <label id="sizeRow">Size <input type="range" id="sizeSlider" min="0.5" max="6" step="0.1" value="1" /></label>
  </div>

  <div id="debug" class="hidden" aria-hidden="true"></div>

  <button id="infoBtn" aria-label="About">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z" />
    </svg>
  </button>

  <div id="infoModal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
    <div id="infoCard">
      <button id="infoClose" aria-label="Close">&times;</button>
      <h2 id="infoTitle">About</h2>
      <p>Inspired by <a href="https://x.com/pomis172/status/2060124647320928655" target="_blank" rel="noopener noreferrer">this tweet</a>.</p>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const enableBtn = document.getElementById("enable");
  const smoothCheck = document.getElementById("smoothCheck");
  const predictCheck = document.getElementById("predictCheck");
  const accelCheck = document.getElementById("accelCheck");
  const jerkCheck = document.getElementById("jerkCheck");

  // Smoothing: when off, snap to the target instead of easing toward it.
  // Prediction: when off, reproduce the pre-update behavior (ease toward the
  // raw reading with no extrapolation) for an A/B comparison.
  // Accel guard: when on, damp the prediction while linear acceleration is
  // high (e.g. shoving the phone) so jitter isn't amplified into flicker.
  // Jerk guard: same idea, but keyed off jerk (rate of change of acceleration).
  let smoothing = false;
  let prediction = true;
  let accelGuard = true;
  let jerkGuard = true;
  smoothCheck.addEventListener("change", () => { smoothing = smoothCheck.checked; });
  predictCheck.addEventListener("change", () => { prediction = predictCheck.checked; });
  accelCheck.addEventListener("change", () => { accelGuard = accelCheck.checked; });
  jerkCheck.addEventListener("change", () => { jerkGuard = jerkCheck.checked; });

  // Debug overlay: when on, show a live readout of the internal signals that
  // drive the effect (accel magnitude, damping, angular velocity, vectors).
  const debugCheck = document.getElementById("debugCheck");
  const debugPanel = document.getElementById("debug");
  let debugOn = false;
  debugCheck.addEventListener("change", () => {
    debugOn = debugCheck.checked;
    debugPanel.classList.toggle("hidden", !debugOn);
  });

  // Density slider: higher = denser. Rebuilds the dot grid on change.
  const densitySlider = document.getElementById("densitySlider");
  densitySlider.addEventListener("input", () => {
    densityDivisor = +densitySlider.value;
    buildGrid();
  });

  // Size slider: dot radius in px. No grid rebuild needed.
  const sizeSlider = document.getElementById("sizeSlider");
  sizeSlider.addEventListener("input", () => { dotRadius = +sizeSlider.value; });

  // Info modal open/close.
  const infoModal = document.getElementById("infoModal");
  document.getElementById("infoBtn").addEventListener("click", () => infoModal.classList.remove("hidden"));
  document.getElementById("infoClose").addEventListener("click", () => infoModal.classList.add("hidden"));
  infoModal.addEventListener("click", (e) => { if (e.target === infoModal) infoModal.classList.add("hidden"); });

  // --- Tunables ---------------------------------------------------------
  let dotRadius = 1;             // dot radius in px; set by the size slider
  const SPOT = 0.85;             // angular radius (radians) of the "lit" zone
  const BASE_GRAY = 32;          // brightness of a far-away dot (0-255)

  // Orientation prediction (see frame()): we extrapolate the orientation
  // vector forward by LEAD_MS to mask the sensor's latency.
  const LEAD_MS = 90;            // how far ahead to predict (ms)
  const ACCEL_GAIN = 1.0;        // how strongly acceleration extends the lead
  const MAX_LEAD_ANGLE = 0.6;    // clamp on predicted rotation (radians)
  const VEL_SMOOTH = 0.35;       // angular-velocity smoothing (0-1)
  const CUR_SMOOTH = 0.5;        // light de-jitter easing toward the prediction
  const OLD_SMOOTH = 0.15;       // pre-update easing (used when prediction off)
  const STALE_MS = 120;          // drop velocity if readings stop coming

  // Accel guard: damp the prediction as linear acceleration (DeviceMotion)
  // rises, so a fast translation can't amplify sensor jitter into flicker.
  const ACC_LOW = 3;             // below this (m/s^2) prediction is untouched
  const ACC_HIGH = 4;            // above this the prediction is fully damped
  const ACC_SMOOTH = 0.4;        // EMA factor for the accel magnitude

  // Jerk guard: same ramp keyed off |jerk| (rate of change of acceleration).
  const JERK_LOW = 10;           // below this (m/s^3) prediction is untouched
  const JERK_HIGH = 15;          // above this the prediction is fully damped

  // --- Dot grid ---------------------------------------------------------
  // Each dot also carries `target`: a random unit vector representing an
  // orientation it "responds" to. The closer the device's current
  // orientation vector is to this target, the whiter the dot.
  let dots = [];
  let cols = 0, rows = 0, spacing = 0;
  let W = 0, H = 0, dpr = 1;
  let densityDivisor = 34;       // higher = smaller spacing = denser; set by slider

  // Pick a point uniformly at random on the unit sphere.
  function randomUnitVector() {
    const z = Math.random() * 2 - 1;
    const theta = Math.random() * Math.PI * 2;
    const r = Math.sqrt(1 - z * z);
    return [r * Math.cos(theta), r * Math.sin(theta), z];
  }

  function buildGrid() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Density scales with screen size; aim for a tight dotted texture.
    spacing = Math.max(6, Math.min(W, H) / densityDivisor);
    cols = Math.ceil(W / spacing) + 1;
    rows = Math.ceil(H / spacing) + 1;

    dots = [];
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        dots.push({
          x: i * spacing,
          y: j * spacing,
          target: randomUnitVector(),
        });
      }
    }
  }

  // --- Orientation -> direction vector ----------------------------------
  // Current device orientation as a unit vector: the image of the screen
  // normal [0,0,1] under the device's rotation.
  let cur = [0, 0, 1];           // rendered (predicted) vector
  let measVec = [0, 0, 1];       // latest measured vector

  // Angular-velocity tracking, used to extrapolate `measVec` forward.
  let prevMeas = null;           // previous measured vector
  let prevMeasTime = 0;          // timestamp of that measurement (ms)
  let angSpeed = 0;              // smoothed angular speed (rad/s)
  let prevAngSpeed = 0;          // previous frame's speed, for acceleration
  let angAxis = [0, 0, 1];       // axis the vector is rotating about
  let lastFrameTime = 0;
  let accelMag = 0;              // smoothed linear-acceleration magnitude (m/s^2)
  let jerkMag = 0;               // smoothed jerk = d(accelMag)/dt (m/s^3); drives the Jerk guard
  let prevAccelMag = 0;          // previous accel magnitude, for the jerk finite-difference
  let prevMotionTime = 0;        // timestamp of the last devicemotion sample (ms)

  // Convert (alpha, beta, gamma) Euler angles (degrees, ZXY order per the
  // W3C DeviceOrientation spec) into a quaternion, then rotate [0,0,1].
  function orientationToVector(alphaDeg, betaDeg, gammaDeg) {
    const _z = (alphaDeg || 0) * Math.PI / 180; // alpha: around Z
    const _x = (betaDeg  || 0) * Math.PI / 180; // beta:  around X
    const _y = (gammaDeg || 0) * Math.PI / 180; // gamma: around Y

    const cX = Math.cos(_x / 2), cY = Math.cos(_y / 2), cZ = Math.cos(_z / 2);
    const sX = Math.sin(_x / 2), sY = Math.sin(_y / 2), sZ = Math.sin(_z / 2);

    // Quaternion for ZXY rotation order.
    const w = cX * cY * cZ - sX * sY * sZ;
    const x = sX * cY * cZ - cX * sY * sZ;
    const y = cX * sY * cZ + sX * cY * sZ;
    const z = cX * cY * sZ + sX * sY * cZ;

    // Rotate the reference vector [0,0,1] by this quaternion: the third
    // column of the corresponding rotation matrix.
    return [
      2 * (x * z + w * y),
      2 * (y * z - w * x),
      1 - 2 * (x * x + y * y),
    ];
  }

  // Rotate vector `v` about unit axis `k` by `theta` radians (Rodrigues).
  function rotateAround(v, k, theta) {
    const c = Math.cos(theta), s = Math.sin(theta);
    const kv = k[0] * v[0] + k[1] * v[1] + k[2] * v[2];
    const cx = k[1] * v[2] - k[2] * v[1];
    const cy = k[2] * v[0] - k[0] * v[2];
    const cz = k[0] * v[1] - k[1] * v[0];
    return [
      v[0] * c + cx * s + k[0] * kv * (1 - c),
      v[1] * c + cy * s + k[1] * kv * (1 - c),
      v[2] * c + cz * s + k[2] * kv * (1 - c),
    ];
  }

  // Take a freshly measured orientation vector and update both the latest
  // value and the angular-velocity estimate (by finite difference). Shared
  // by the sensor and the pointer fallback.
  function ingestVector(newVec) {
    const now = performance.now();
    if (prevMeas) {
      const dt = (now - prevMeasTime) / 1000;
      if (dt > 0) {
        let cosA = prevMeas[0] * newVec[0] + prevMeas[1] * newVec[1] + prevMeas[2] * newVec[2];
        if (cosA > 1) cosA = 1; else if (cosA < -1) cosA = -1;
        const angle = Math.acos(cosA);
        // Rotation axis between the two samples = prevMeas x newVec.
        let ax = prevMeas[1] * newVec[2] - prevMeas[2] * newVec[1];
        let ay = prevMeas[2] * newVec[0] - prevMeas[0] * newVec[2];
        let az = prevMeas[0] * newVec[1] - prevMeas[1] * newVec[0];
        const al = Math.hypot(ax, ay, az);
        const instSpeed = angle / dt;
        angSpeed += (instSpeed - angSpeed) * VEL_SMOOTH;
        if (al > 1e-6) angAxis = [ax / al, ay / al, az / al];
      }
    }
    prevMeas = newVec;
    prevMeasTime = now;
    measVec = newVec;
  }

  function onOrientation(e) {
    if (e.alpha == null && e.beta == null && e.gamma == null) return;
    ingestVector(orientationToVector(e.alpha, e.beta, e.gamma));
  }

  // Track the magnitude of linear acceleration (gravity excluded). Used by the
  // Accel guard to damp the prediction while the phone is being moved fast.
  function onMotion(e) {
    const lin = e.acceleration;
    if (!lin) return; // device either reports `acceleration` or it doesn't
    const now = performance.now();
    const m = Math.hypot(lin.x || 0, lin.y || 0, lin.z || 0);
    accelMag += (m - accelMag) * ACC_SMOOTH;

    // Jerk: rate of change of the (smoothed) acceleration magnitude. Tracked
    // for the debug overlay only — not yet fed into the prediction.
    if (prevMotionTime) {
      const dt = (now - prevMotionTime) / 1000;
      if (dt > 0) jerkMag += ((accelMag - prevAccelMag) / dt - jerkMag) * ACC_SMOOTH;
    }
    prevAccelMag = accelMag;
    prevMotionTime = now;
  }

  // --- Debug overlay ----------------------------------------------------
  // Values computed inside frame() that the overlay needs to read back.
  const dbg = { damp: 1, accDamp: 1, jerkDamp: 1, predAngle: 0, fps: 0 };

  // Each metric: a live accessor, a bar range, and a formatter. `bip` draws a
  // bipolar bar growing out from the center; `ticks` marks thresholds (accel).
  const debugMetrics = [
    { label: "accel",   get: () => accelMag,      min: 0, max: 8,
      ticks: [ACC_LOW, ACC_HIGH], warn: () => accelGuard && dbg.accDamp < 1, fmt: (v) => v.toFixed(2) },
    { label: "jerk",    get: () => jerkMag,       min: -50, max: 50, bip: true,
      warn: () => jerkGuard && dbg.jerkDamp < 1, fmt: (v) => v.toFixed(1) },
    { label: "damp",    get: () => dbg.damp,      min: 0, max: 1, fmt: (v) => v.toFixed(2) },
    { label: "angVel",  get: () => angSpeed,      min: 0, max: 6, fmt: (v) => v.toFixed(2) },
    { label: "predAng", get: () => dbg.predAngle, min: -MAX_LEAD_ANGLE, max: MAX_LEAD_ANGLE, bip: true, fmt: (v) => v.toFixed(3) },
    { label: "meas x",  get: () => measVec[0],    min: -1, max: 1, bip: true, fmt: (v) => v.toFixed(2) },
    { label: "meas y",  get: () => measVec[1],    min: -1, max: 1, bip: true, fmt: (v) => v.toFixed(2) },
    { label: "meas z",  get: () => measVec[2],    min: -1, max: 1, bip: true, fmt: (v) => v.toFixed(2) },
    { label: "pred x",  get: () => cur[0],        min: -1, max: 1, bip: true, fmt: (v) => v.toFixed(2) },
    { label: "pred y",  get: () => cur[1],        min: -1, max: 1, bip: true, fmt: (v) => v.toFixed(2) },
    { label: "pred z",  get: () => cur[2],        min: -1, max: 1, bip: true, fmt: (v) => v.toFixed(2) },
    { label: "fps",     get: () => dbg.fps,       min: 0, max: 120, fmt: (v) => v.toFixed(0) },
  ];

  // Build the rows once and cache the fill/value elements for fast updates.
  function buildDebug() {
    const head = document.createElement("h3");
    head.textContent = "Debug";
    debugPanel.appendChild(head);
    for (const m of debugMetrics) {
      const row = document.createElement("div");
      row.className = "dbg-row";

      const label = document.createElement("span");
      label.className = "dbg-label";
      label.textContent = m.label;

      const track = document.createElement("div");
      track.className = "dbg-track" + (m.bip ? " bip" : "");
      const fill = document.createElement("div");
      fill.className = "dbg-fill";
      track.appendChild(fill);
      if (m.ticks) {
        for (const t of m.ticks) {
          const tick = document.createElement("div");
          tick.className = "dbg-tick";
          tick.style.left = (100 * (t - m.min) / (m.max - m.min)) + "%";
          track.appendChild(tick);
        }
      }

      const val = document.createElement("span");
      val.className = "dbg-val";

      row.appendChild(label);
      row.appendChild(track);
      row.appendChild(val);
      debugPanel.appendChild(row);
      m._fill = fill;
      m._val = val;
    }
  }

  // Map each metric to a bar width/position and refresh its number.
  function updateDebug() {
    for (const m of debugMetrics) {
      const v = m.get();
      let pct = (v - m.min) / (m.max - m.min);
      if (pct < 0) pct = 0; else if (pct > 1) pct = 1;
      const fill = m._fill;
      if (m.bip) {
        // Grow out from the 50% center line in either direction.
        if (pct >= 0.5) { fill.style.left = "50%"; fill.style.width = ((pct - 0.5) * 100) + "%"; }
        else { fill.style.left = (pct * 100) + "%"; fill.style.width = ((0.5 - pct) * 100) + "%"; }
      } else {
        fill.style.left = "0";
        fill.style.width = (pct * 100) + "%";
      }
      fill.style.background = (m.warn && m.warn()) ? "#ff5b5b" : "#5b9bff";
      m._val.textContent = m.fmt(v);
    }
  }

  // --- Render loop ------------------------------------------------------
  function frame(ts) {
    const now = ts || performance.now();
    const frameDt = lastFrameTime ? (now - lastFrameTime) / 1000 : 1 / 60;
    lastFrameTime = now;

    // If readings have stopped arriving (device held still), relax the
    // velocity so the prediction doesn't keep drifting.
    if (now - prevMeasTime > STALE_MS) angSpeed = 0;

    // Predict the orientation LEAD_MS ahead: velocity term + an acceleration
    // term that pushes further when speeding up and pulls back when slowing.
    const accel = frameDt > 0 ? (angSpeed - prevAngSpeed) / frameDt : 0;
    prevAngSpeed = angSpeed;
    const lead = LEAD_MS / 1000;
    let predAngle = angSpeed * lead + 0.5 * accel * lead * lead * ACCEL_GAIN;
    if (predAngle > MAX_LEAD_ANGLE) predAngle = MAX_LEAD_ANGLE;
    else if (predAngle < -MAX_LEAD_ANGLE) predAngle = -MAX_LEAD_ANGLE;

    // Accel guard: as linear acceleration rises from ACC_LOW to ACC_HIGH, ramp
    // the prediction down to zero so a fast shove can't amplify jitter.
    let accDamp = 1 - (accelMag - ACC_LOW) / (ACC_HIGH - ACC_LOW);
    if (accDamp < 0) accDamp = 0; else if (accDamp > 1) accDamp = 1;

    // Jerk guard: same ramp keyed off the magnitude of the jerk.
    const absJerk = jerkMag < 0 ? -jerkMag : jerkMag;
    let jerkDamp = 1 - (absJerk - JERK_LOW) / (JERK_HIGH - JERK_LOW);
    if (jerkDamp < 0) jerkDamp = 0; else if (jerkDamp > 1) jerkDamp = 1;

    // Effective damping = product of the enabled guards. (Ramps are always
    // computed so the debug overlay can show them; applied only when on.)
    let damp = 1;
    if (accelGuard) damp *= accDamp;
    if (jerkGuard) damp *= jerkDamp;
    predAngle *= damp;

    // Target the prediction when on; otherwise the raw reading (pre-update).
    const target = prediction ? rotateAround(measVec, angAxis, predAngle) : measVec;

    // Ease toward the target; snap if smoothing is off. With prediction off we
    // use the original 0.15 easing so the comparison is faithful.
    let kSmooth = prediction ? CUR_SMOOTH : OLD_SMOOTH;
    if (!smoothing) kSmooth = 1;
    cur[0] += (target[0] - cur[0]) * kSmooth;
    cur[1] += (target[1] - cur[1]) * kSmooth;
    cur[2] += (target[2] - cur[2]) * kSmooth;
    const len = Math.hypot(cur[0], cur[1], cur[2]) || 1;
    const vx = cur[0] / len, vy = cur[1] / len, vz = cur[2] / len;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, W, H);

    for (let k = 0; k < dots.length; k++) {
      const d = dots[k];
      const t = d.target;
      // Angular distance between current orientation and this dot's target.
      let dot = vx * t[0] + vy * t[1] + vz * t[2];
      if (dot > 1) dot = 1; else if (dot < -1) dot = -1;
      const ang = Math.acos(dot); // 0 = exact match, PI = opposite

      // Closeness in [0,1]; whiter as the orientation nears the target.
      const close = Math.max(0, 1 - ang / SPOT);
      const g = Math.round(BASE_GRAY + (255 - BASE_GRAY) * (close * close));

      ctx.fillStyle = "rgb(" + g + "," + g + "," + g + ")";
      ctx.beginPath();
      ctx.arc(d.x, d.y, dotRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    if (debugOn) {
      dbg.damp = damp;
      dbg.accDamp = accDamp;
      dbg.jerkDamp = jerkDamp;
      dbg.predAngle = predAngle;
      if (frameDt > 0) dbg.fps += (1 / frameDt - dbg.fps) * 0.1;
      updateDebug();
    }

    requestAnimationFrame(frame);
  }

  // --- Pointer fallback (desktop / no sensor) ---------------------------
  // Maps the cursor to a synthetic orientation so the effect is testable
  // without a real device sensor. Disabled because on touch devices a tap
  // fires pointer events and spuriously triggers the effect.
  // function onPointer(e) {
  //   const px = (e.clientX / W) * 2 - 1;   // -1..1
  //   const py = (e.clientY / H) * 2 - 1;   // -1..1
  //   const v = [px, py, Math.sqrt(Math.max(0, 1 - px * px - py * py))];
  //   ingestVector(v);
  // }

  // --- Sensor permission flow ------------------------------------------
  // iOS 13+ Safari (and some others) require an explicit user gesture +
  // requestPermission() before DeviceOrientationEvent fires.
  const needsPermission =
    typeof DeviceOrientationEvent !== "undefined" &&
    typeof DeviceOrientationEvent.requestPermission === "function";

  function startListening() {
    window.addEventListener("deviceorientation", onOrientation, { passive: true });
    window.addEventListener("devicemotion", onMotion, { passive: true });
  }

  function requestAndStart() {
    // DeviceMotion is gated separately from DeviceOrientation on iOS; request
    // both from this single tap. Orientation drives the effect, so it decides
    // whether activation succeeded; motion only feeds the Accel guard.
    const motionReq = (typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function")
      ? DeviceMotionEvent.requestPermission().catch(() => "denied")
      : Promise.resolve("granted");

    Promise.all([DeviceOrientationEvent.requestPermission(), motionReq])
      .then(([orientState]) => {
        if (orientState === "granted") {
          startListening();
          enableBtn.classList.add("hidden");
        } else {
          enableBtn.textContent = "Motion blocked — retry";
        }
      })
      .catch(() => { enableBtn.textContent = "Tap to activate"; });
  }

  if (needsPermission) {
    enableBtn.classList.remove("hidden");
    enableBtn.addEventListener("click", requestAndStart);
  } else if (typeof DeviceOrientationEvent !== "undefined") {
    // Browsers that don't gate the sensor: just listen.
    startListening();
  }

  // Pointer fallback so it's alive on desktop and before activation.
  // window.addEventListener("pointermove", onPointer, { passive: true });

  window.addEventListener("resize", buildGrid);
  window.addEventListener("orientationchange", () => setTimeout(buildGrid, 200));

  buildDebug();
  buildGrid();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
