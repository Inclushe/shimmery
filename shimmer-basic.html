<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Shimmery</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Activation button - hidden by default; only shown if permission is denied
     or a user gesture is required (see the permission flow in the script). */
    #enable {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: calc(env(safe-area-inset-right, 0px) + 16px);
      z-index: 10;
      padding: 11px 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      background: rgba(20, 22, 30, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      /* hidden by default */
      transition: opacity .25s ease, transform .15s ease;
    }

    #enable:active {
      transform: scale(0.96);
    }

    #enable.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* "Open on your phone" message for devices with no usable motion sensor */
    #desktopMsg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: left;
      color: rgba(255, 255, 255, 0.9);
      font-size: 19px;
      font-weight: 600;
      line-height: 1.4;
    }

    #desktopMsg.hidden {
      display: none;
    }

    #desktopMsg .dm-icon {
      display: block;
      width: 44px;
      height: 44px;
      margin-bottom: 16px;
    }

    #desktopMsg .dm-sub {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <button id="enable">Tap to activate</button>
  <div id="desktopMsg" class="hidden">
    <div>
      <svg class="dm-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="5 0 24 24" stroke-width="1.5"
        stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
      </svg>
      Open this on your phone
      <span class="dm-sub">This effect uses your device's orientation sensor.</span>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const enableBtn = document.getElementById("enable");
      const desktopMsg = document.getElementById("desktopMsg");

      // --- Look ------------------------------------------------------------
      const SPOT = 0.85;             // angular radius (radians) of the "lit" zone
      const BASE_GRAY = 32;          // brightness of a far-away dot (0-255)
      const dotRadius = 6;           // dot radius in px
      const densityDivisor = 34;     // higher = smaller spacing = denser

      // --- Dot grid --------------------------------------------------------
      // Each dot carries `target`: a random unit vector representing an
      // orientation it "responds" to. The closer the device's current
      // orientation vector is to this target, the whiter the dot.
      let dots = [];
      let W = 0, H = 0, dpr = 1;

      // Pick a point uniformly at random on the unit sphere.
      function randomUnitVector() {
        const z = Math.random() * 2 - 1;
        const theta = Math.random() * Math.PI * 2;
        const r = Math.sqrt(1 - z * z);
        return [r * Math.cos(theta), r * Math.sin(theta), z];
      }

      function buildGrid() {
        dpr = Math.min(window.devicePixelRatio || 1, 2.5);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Density scales with screen size; aim for a tight dotted texture.
        const spacing = Math.max(6, Math.min(W, H) / densityDivisor);
        const cols = Math.ceil(W / spacing) + 1;
        const rows = Math.ceil(H / spacing) + 1;

        dots = [];
        for (let j = 0; j < rows; j++) {
          for (let i = 0; i < cols; i++) {
            dots.push({ x: i * spacing, y: j * spacing, target: randomUnitVector() });
          }
        }
      }

      // --- Orientation -> direction vector ----------------------------------
      // Convert (alpha, beta, gamma) Euler angles (degrees, ZXY order per the
      // W3C DeviceOrientation spec) into a quaternion, then rotate [0,0,1].
      function orientationToVector(alphaDeg, betaDeg, gammaDeg) {
        const _z = (alphaDeg || 0) * Math.PI / 180; // alpha: around Z
        const _x = (betaDeg || 0) * Math.PI / 180;  // beta:  around X
        const _y = (gammaDeg || 0) * Math.PI / 180; // gamma: around Y

        const cX = Math.cos(_x / 2), cY = Math.cos(_y / 2), cZ = Math.cos(_z / 2);
        const sX = Math.sin(_x / 2), sY = Math.sin(_y / 2), sZ = Math.sin(_z / 2);

        // Quaternion for ZXY rotation order.
        const w = cX * cY * cZ - sX * sY * sZ;
        const x = sX * cY * cZ - cX * sY * sZ;
        const y = cX * sY * cZ + sX * cY * sZ;
        const z = cX * cY * sZ + sX * sY * cZ;

        // Rotate the reference vector [0,0,1] by this quaternion: the third
        // column of the corresponding rotation matrix.
        return [
          2 * (x * z + w * y),
          2 * (y * z - w * x),
          1 - 2 * (x * x + y * y),
        ];
      }

      // --- Render ----------------------------------------------------------
      // Drawn straight from the latest reading - no rAF loop, no smoothing and
      // no prediction. Each orientation event paints one frame.
      let orientVec = [0, 0, 1];  // latest measured vector, used as-is
      let hasData = false;        // first reading arrived?

      function render() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, W, H);

        // Keep the canvas blank until the first orientation reading arrives, so
        // the dots don't flash at the default orientation on load.
        if (!hasData) return;

        const len = Math.hypot(orientVec[0], orientVec[1], orientVec[2]) || 1;
        const vx = orientVec[0] / len, vy = orientVec[1] / len, vz = orientVec[2] / len;

        for (let k = 0; k < dots.length; k++) {
          const d = dots[k];
          const t = d.target;
          // Each dot responds to two poles: its target and the antipodal target
          // (-target). Both light the dot the same way; take whichever is closer.
          let dot = vx * t[0] + vy * t[1] + vz * t[2];
          if (dot > 1) dot = 1; else if (dot < -1) dot = -1;
          const angA = Math.acos(dot);   // distance to the target (0 = exact match)
          const angB = Math.acos(-dot);  // distance to the opposite target (= PI - angA)

          // Closeness in [0,1] for each pole; whiter as the orientation nears either.
          const closeA = Math.max(0, 1 - angA / SPOT);
          const closeB = Math.max(0, 1 - angB / SPOT);
          const close = Math.max(closeA, closeB);
          const g = Math.round(BASE_GRAY + (255 - BASE_GRAY) * (close * close));

          ctx.fillStyle = "rgb(" + g + "," + g + "," + g + ")";
          ctx.beginPath();
          ctx.arc(d.x, d.y, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function onOrientation(e) {
        if (e.alpha == null && e.beta == null && e.gamma == null) return;
        orientVec = orientationToVector(e.alpha, e.beta, e.gamma);
        if (!hasData) {
          hasData = true;
          desktopMsg.classList.add("hidden"); // real sensor data -> not a desktop
        }
        render();
      }

      // --- Sensor permission flow ------------------------------------------
      // iOS 13+ Safari (and some others) require an explicit user gesture +
      // requestPermission() before DeviceOrientationEvent fires.
      const hasOrientation = typeof DeviceOrientationEvent !== "undefined";
      const needsPermission =
        hasOrientation && typeof DeviceOrientationEvent.requestPermission === "function";

      function startListening() {
        window.addEventListener("deviceorientation", onOrientation, { passive: true });
      }

      // Triggered by tapping the button (a real user gesture) when one is required.
      function requestAndStart() {
        DeviceOrientationEvent.requestPermission()
          .then((state) => {
            if (state === "granted") {
              startListening();
              enableBtn.classList.remove("show");
            } else {
              // Denied: iOS won't prompt again until site data is cleared.
              enableBtn.textContent = "Motion blocked - retry";
            }
          })
          .catch(() => { enableBtn.textContent = "Tap to activate"; });
      }

      if (needsPermission) {
        enableBtn.addEventListener("click", requestAndStart);
        // Probe without a gesture: browsers that auto-approve (e.g. Chrome on
        // Android) resolve "granted" and the button stays hidden; iOS rejects
        // because it needs a user activation, so we reveal the button to retry.
        DeviceOrientationEvent.requestPermission()
          .then((state) => {
            if (state === "granted") startListening();
            else enableBtn.classList.add("show");
          })
          .catch(() => enableBtn.classList.add("show"));
      } else if (hasOrientation) {
        // Browsers that don't gate the sensor: just listen.
        startListening();
      } else {
        // No DeviceOrientation support at all.
        desktopMsg.classList.remove("hidden");
      }

      // Give the sensor a moment to deliver a first reading. If none arrives and
      // no permission button is waiting to be tapped, this device has no usable
      // orientation sensor (desktop/laptop) - tell them to use a phone.
      setTimeout(() => {
        if (!hasData && !enableBtn.classList.contains("show")) {
          desktopMsg.classList.remove("hidden");
        }
      }, 500);

      window.addEventListener("resize", () => { buildGrid(); render(); });
      window.addEventListener("orientationchange", () => {
        setTimeout(() => { buildGrid(); render(); }, 200);
      });

      buildGrid();
      render();
    })();
  </script>
</body>

</html>
